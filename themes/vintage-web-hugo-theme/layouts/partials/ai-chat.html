{{ $enabled := .Site.Params.ai_chat.enabled | default true }}
{{ if $enabled }}
<div
  id="ai-chat-widget"
  class="ai-chat"
  data-api-base="{{ .Site.Params.ai_chat.api_base | default "/api/chat" }}"
  data-launcher-image="{{ .Site.Params.ai_chat.launcher_image | default "" }}"
  data-ai-avatar="{{ .Site.Params.ai_chat.ai_avatar | default "" }}"
>
  <button id="ai-chat-toggle" class="ai-chat-toggle" type="button" aria-expanded="false" aria-controls="ai-chat-panel" aria-label="打开 AI 助手">
    <img id="ai-chat-toggle-image" alt="AI launcher" />
  </button>

  <section id="ai-chat-panel" class="ai-chat-panel" aria-label="AI Chat" hidden>
    <header class="ai-chat-header">
      <div class="ai-chat-header-title">
        <img id="ai-chat-header-avatar" alt="AI avatar" />
        <strong>AI Assistant</strong>
      </div>
      <div class="ai-chat-actions">
        <button id="ai-chat-clear" type="button">清空</button>
        <button id="ai-chat-close" type="button">收起</button>
      </div>
    </header>

    <div id="ai-chat-messages" class="ai-chat-messages" aria-live="polite"></div>

    <form id="ai-chat-form" class="ai-chat-form">
      <input id="ai-chat-input" type="text" placeholder="输入问题，回车发送" maxlength="2000" autocomplete="off" />
      <button id="ai-chat-send" type="submit">Send</button>
    </form>
  </section>
</div>
{{ end }}
