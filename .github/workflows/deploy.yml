name: 自动构建并部署 Hugo 博客

on:
  push:
    branches: [main]        # 推送到 main 分支时自动触发
  workflow_dispatch:        # 也支持在 GitHub 页面手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码（含主题子模块）
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          submodules: true   # 如果主题是 git submodule 则需要此项
          fetch-depth: 0

      # 2. 安装 Hugo
      - name: 安装 Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true     # 使用 extended 版本以支持 SCSS/SASS

      # 3. 构建静态网站（不加 --minify，与本地构建保持一致，避免 CSS/JS 哈希值不同）
      - name: 构建网站
        run: hugo

      # 4. 配置 SSH 密钥（密钥需提前添加到 GitHub Secrets）
      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # 将服务器添加到已知主机，避免首次连接的确认提示
          ssh-keyscan -H 39.106.85.231 >> ~/.ssh/known_hosts

      # 5. 通过 rsync 同步文件到服务器
      - name: 部署到服务器
        run: |
          rsync -av --delete public/ root@39.106.85.231:/var/www/html/

      # 6. 修复服务器文件权限
      - name: 修复文件权限
        run: |
          ssh root@39.106.85.231 "sudo /usr/local/bin/fix-web-permissions.sh"
