name: 自动构建并部署 Hugo 博客

on:
  push:
    branches: [main]        # 推送到 main 分支时自动触发
  workflow_dispatch:        # 也支持在 GitHub 页面手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 安装 Hugo（版本必须与本地一致，否则 CSS/JS 哈希会不同导致样式丢失）
      - name: 安装 Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.154.3'
          extended: true     # 使用 extended 版本以支持 SCSS/SASS

      # 3. 构建静态网站（不加 --minify，与本地构建保持一致，避免 CSS/JS 哈希值不同）
      - name: 构建网站
        run: |
          rm -rf public
          hugo

      # 4. 配置 SSH 密钥（密钥需提前添加到 GitHub Secrets）
      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # 将服务器添加到已知主机，避免首次连接的确认提示
          ssh-keyscan -H 39.106.85.231 >> ~/.ssh/known_hosts

      # 5. 通过 rsync 同步文件到服务器
      - name: 部署到服务器
        run: |
          rsync -av --delete public/ root@39.106.85.231:/var/www/html/

      # 6. 拉取后端代码并安装依赖
      - name: 更新 AI 后端
        run: |
          ssh root@39.106.85.231 "cd /var/www/2p1c_blog && git pull && cd ai-assistant && npm ci --production"

      # 7. 同步 posts-index.json、构建 embedding（best-effort）、重启后端
      - name: 更新 AI 助手内容索引
        run: |
          ssh root@39.106.85.231 "cp /var/www/html/posts-index.json /var/www/2p1c_blog/ai-assistant/data/posts-index.json && cd /var/www/2p1c_blog/ai-assistant && (node scripts/build-index.js || echo 'Build index skipped (model unavailable)') && pm2 restart ai-assistant"

      # 8. 修复服务器文件权限
      - name: 修复文件权限
        run: |
          ssh root@39.106.85.231 "sudo /usr/local/bin/fix-web-permissions.sh"
